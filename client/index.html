<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Portal</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .toggle { margin-top: 15px; color: #007bff; cursor: pointer; display: block; font-size: 14px; }
        #message { margin-top: 15px; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">User Login</h2>
    <input type="text" id="name" placeholder="Full Name" style="display:none;">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">

    <button id="action-btn" onclick="handleSubmit()">Login</button>

    <span class="toggle" id="toggle-link" onclick="toggleForm()">Don't have an account? Sign Up</span>

    <div id="message"></div>
</div>

<script>
    let isLoginMode = true;

    function toggleForm() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? 'User Login' : 'User Signup';
        document.getElementById('name').style.display = isLoginMode ? 'none' : 'block';
        document.getElementById('action-btn').innerText = isLoginMode ? 'Login' : 'Sign Up';
        document.getElementById('toggle-link').innerText = isLoginMode ? "Don't have an account? Sign Up" : "Already have an account? Login";
        document.getElementById('message').innerText = ""; 
    }

    async function handleSubmit() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('message');

        const route = isLoginMode ? 'login' : 'register';
        const bodyData = isLoginMode ? { email, password } : { name, email, password };

        msg.innerText = "Connecting...";

        try {
            // Updated fetch URL to use the dynamic route correctly
            const res = await fetch('http://localhost:5000/api/user/' + route, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData)
            });

            const data = await res.json();

            if (res.ok) {
                if (isLoginMode) {
                    // Save the JWT token returned by your auth.js login route
                    localStorage.setItem('auth-token', data.token);
                    msg.style.color = "green";
                    msg.innerText = "Login Successful! Redirecting...";
                    // Redirect to your dashboard file
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    msg.style.color = "green";
                    msg.innerText = "Account Created! Now Login.";
                    toggleForm();
                }
            } else {
                msg.style.color = "red";
                msg.innerText = data.message || "Error";
            }
        } catch (err) {
            msg.style.color = "red";
            msg.innerText = "Server Offline! Check your VS Code terminal.";
        }
    }
</script>
</body>
</html>
